version: v1
port: 8080

rules:
  - host: bearer-auth.example.com
    backend:
      service:
        name: api-service
        port: 8080
        auth:
          # enabled: true  # optional, defaults to true when type is set; set to false to temporarily disable auth
          type: bearer
          bearer:
            tokens:
              - my-secret-token-123
