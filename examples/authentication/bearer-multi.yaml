version: v1
port: 8080

rules:
  - host: bearer-auth-multi.example.com
    backend:
      service:
        mode: external
        protocol: https
        name: httpbin.zcorky.com
        port: 443
        auth:
          # enabled: true  # optional, defaults to true when type is set; set to false to temporarily disable auth
          type: bearer
          bearer:
            tokens:
              - token1-abc123xyz
              - token2-def456uvw
              - token3-ghi789rst
