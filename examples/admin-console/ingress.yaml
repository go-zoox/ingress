# Runnable sample aligned with the admin console product prototype (routes, WAF, health).
# Validate: ingress validate -c examples/admin-console/ingress.yaml
# Try with admin: ingress admin -c examples/admin-console/admin.yaml

version: v1
port: 8080

# Shared cache engine (matcher + http response cache keys)
cache:
  ttl: 300
  host: 127.0.0.1
  port: 6379
  prefix: "ingress:"

# zoox Config.Logger (YAML key `logging`): console + file transports
logging:
  level: warn
  transports:
    - type: file
      path: ./access.log
      levels:
        error: ./error.log

waf:
  enabled: true
  log_only: false
  builtin: true

healthcheck:
  outer:
    enable: true
    path: /healthz
    ok: true
  inner:
    enable: true
    interval: 30
    timeout: 5

https:
  port: 8443
  redirect_from_http:
    permanent: true
  ssl:
    - domain: api.example.com
      cert:
        certificate: ./certs/api.example.com.pem
        certificate_key: ./certs/api.example.com.key.pem
    - domain: cdn.example.com
      cert:
        certificate: ./certs/cdn.example.com.pem
        certificate_key: ./certs/cdn.example.com.key.pem
    - domain: assets.cdn.example.com
      cert:
        certificate: ./certs/assets.cdn.example.com.pem
        certificate_key: ./certs/assets.cdn.example.com.key.pem
    - domain: admin.internal
      cert:
        certificate: ./certs/admin.internal.pem
        certificate_key: ./certs/admin.internal.key.pem
    - domain: legacy.example.com
      cert:
        certificate: ./certs/legacy.example.com.pem
        certificate_key: ./certs/legacy.example.com.key.pem
    - domain: tunnel-a.inlets.example.com
      cert:
        certificate: ./certs/tunnel-a.inlets.example.com.pem
        certificate_key: ./certs/tunnel-a.inlets.example.com.key.pem
    - domain: waf-demo.example.com
      cert:
        certificate: ./certs/waf-demo.example.com.pem
        certificate_key: ./certs/waf-demo.example.com.key.pem
    - domain: portal.example.com
      cert:
        certificate: ./certs/portal.example.com.pem
        certificate_key: ./certs/portal.example.com.key.pem

rules:
  - host: api.example.com
    backend:
      service:
        name: api.internal
        port: 8080
    paths:
      - path: /v2
        backend:
          service:
            name: api-v2.internal
            port: 8080
          cache:
            enabled: true
            ttl: 600
      - path: /public
        backend:
          service:
            name: api.internal
            port: 8080
          cache:
            enabled: true
            ttl: 300

  - host: "*.cdn.example.com"
    host_type: wildcard
    backend:
      service:
        name: minio.internal
        port: 9000
      cache:
        enabled: true
        ttl: 3600

  - host: ^([a-z0-9-]+)\.inlets\.example\.com$
    host_type: regex
    backend:
      service:
        name: ${host.1}.tunnel
        port: 443
        protocol: https

  - host: admin.internal
    backend:
      type: handler
      handler:
        headers:
          Content-Type: text/plain; charset=utf-8
        body: "admin console demo host\n"
      cache:
        enabled: true
        ttl: 60
    paths:
      - path: /healthz
        backend:
          type: handler
          handler:
            headers:
              Content-Type: text/plain; charset=utf-8
            body: "ok\n"

  - host: legacy.example.com
    backend:
      type: redirect
      redirect:
        url: https://www.example.com$request_uri
        permanent: true
      cache:
        enabled: true
        ttl: 120
