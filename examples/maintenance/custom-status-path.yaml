version: v1
port: 8080

# Custom JSON status probe path (default is /_/ingress/status).
maintenance:
  status_path: /internal/ingress-status
  hosts:
    - host: app.example.com
      window:
        start: "2026-01-01T00:00:00Z"
        end: "2026-12-31T23:59:59Z"
  title: Planned maintenance

rules:
  - host: app.example.com
    backend:
      type: service
      service:
        name: httpbin.org
        port: 443
        protocol: https
