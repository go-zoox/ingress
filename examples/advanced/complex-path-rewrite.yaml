version: v1
port: 8080

rules:
  - host: httpbin.example.work
    backend:
      service:
        mode: external
        name: httpbin.zcorky.com
        protocol: https
        request:
          path:
            rewrites:
              - ^/ip3/(.*):/$1
              - ^/ip2:/ip
    paths:
      - path: /httpbin.org
        backend:
          service:
            mode: external
            name: httpbin.org
            protocol: https
            strip_prefix: true
            # same as
            #
            # request:
            #   path:
            #     rewrites:
            #       - ^/httpbin.org/(.*):/$1
