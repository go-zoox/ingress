version: v1
port: 8080

rules:
  - host: httpbin.example.work
    backend:
      mode: external
      service:
        name: httpbin.zcorky.com
        protocol: https
        request:
          path:
            rewrites:
              - ^/ip3/(.*):/$1
              - ^/ip2:/ip
    paths:
      - path: /httpbin.org
        backend:
          mode: external
          service:
            name: httpbin.org
            protocol: https
            request:
              path:
                rewrites:
                  - ^/httpbin.org/(.*):/$1
