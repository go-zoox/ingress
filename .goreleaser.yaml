env:
  - GO111MODULE=on

before:
  hooks:
    - make -C core/admin web

builds:
  - env:
      - CGO_ENABLED=0
    tags:
      - adminui
    goos:
      - linux
      - darwin
      # - windows
    goarch:
      - amd64
      - arm64
      # - arm
      # - "386"
    goarm:
      - "7"
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{ .CommitDate }} -X main.builtBy=go-zoox
    main: ./cmd/ingress
